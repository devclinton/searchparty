services:
  db:
    image: postgres:17-alpine
    container_name: searchparty-db
    environment:
      POSTGRES_USER: searchparty
      POSTGRES_PASSWORD: searchparty
      POSTGRES_DB: searchparty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchparty"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:17-alpine
    container_name: searchparty-db-test
    environment:
      POSTGRES_USER: searchparty
      POSTGRES_PASSWORD: searchparty
      POSTGRES_DB: searchparty_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchparty"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
